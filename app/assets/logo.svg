<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e8e4ff"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="320" height="80" rx="12" fill="#0d1117"/>

  <!-- Candlestick / chart icon -->
  <!-- Uptrend line -->
  <polyline points="12,60 28,48 40,52 58,28 70,34" fill="none"
            stroke="url(#chartGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
            filter="url(#glow)"/>

  <!-- Candles -->
  <line x1="18" y1="57" x2="18" y2="66" stroke="#7c6af7" stroke-width="1.2"/>
  <rect x="15" y="55" width="6" height="8" rx="1" fill="#7c6af7" opacity="0.85"/>

  <line x1="34" y1="45" x2="34" y2="55" stroke="#4fc3f7" stroke-width="1.2"/>
  <rect x="31" y="43" width="6" height="9" rx="1" fill="#4fc3f7" opacity="0.85"/>

  <line x1="50" y1="26" x2="50" y2="36" stroke="#7c6af7" stroke-width="1.2"/>
  <rect x="47" y="24" width="6" height="8" rx="1" fill="#7c6af7" opacity="0.85"/>

  <line x1="64" y1="31" x2="64" y2="41" stroke="#4fc3f7" stroke-width="1.2"/>
  <rect x="61" y="29" width="6" height="9" rx="1" fill="#4fc3f7" opacity="0.85"/>

  <!-- Shooting star / dream spark -->
  <circle cx="70" cy="22" r="3.5" fill="#4fc3f7" filter="url(#glow)" opacity="0.9"/>
  <line x1="70" y1="22" x2="82" y2="14" stroke="#4fc3f7" stroke-width="1.2" opacity="0.5"/>
  <line x1="70" y1="22" x2="74" y2="10" stroke="#7c6af7" stroke-width="1"   opacity="0.4"/>

  <!-- Divider -->
  <line x1="92" y1="18" x2="92" y2="62" stroke="#2a2f3e" stroke-width="1.5"/>

  <!-- "Project" label -->
  <text x="104" y="30" font-family="'Segoe UI', 'Inter', sans-serif" font-size="11"
        font-weight="400" letter-spacing="3" fill="#6b7fa3" text-anchor="start">PROJECT</text>

  <!-- "Dream" main word -->
  <text x="102" y="58" font-family="'Segoe UI', 'Inter', sans-serif" font-size="30"
        font-weight="700" letter-spacing="1" fill="url(#textGrad)" text-anchor="start"
        filter="url(#glow)">Dream</text>

  <!-- Subtle tagline -->
  <text x="104" y="72" font-family="'Segoe UI', 'Inter', sans-serif" font-size="8.5"
        font-weight="300" letter-spacing="2" fill="#3d4f6e" text-anchor="start">ALGORITHMIC EDGE</text>
</svg>
