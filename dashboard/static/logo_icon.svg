<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="48" height="48" rx="10" fill="#0d1117"/>

  <!-- Uptrend line -->
  <polyline points="6,38 14,28 22,32 34,14 42,20"
            fill="none" stroke="url(#g)" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Candles -->
  <rect x="11" y="26" width="6" height="9" rx="1.5" fill="#7c6af7" opacity="0.9"/>
  <rect x="19" y="29" width="6" height="9" rx="1.5" fill="#4fc3f7" opacity="0.9"/>
  <rect x="31" y="12" width="6" height="9" rx="1.5" fill="#7c6af7" opacity="0.9"/>

  <!-- Star spark -->
  <circle cx="42" cy="14" r="3" fill="#4fc3f7" filter="url(#glow)" opacity="0.95"/>
</svg>
